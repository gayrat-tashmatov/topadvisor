backend:
  name: github
  repo: gayrat-tashmatov/topadvisor
  branch: main
  auth_type: pkce
  app_id: Ov23ctwrNwGwPjZHmVYy

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: insights
    label: Insights
    folder: content/insights
    create: true
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Type
        name: type
        widget: select
        options:
          - digest
          - article
          - report
      - label: Read Time
        name: readTime
        widget: string
      - label: Excerpt
        name: excerpt
        widget: text
      - label: Body
        name: body
        widget: markdown

  - name: projects
    label: Projects
    folder: content/projects
    create: true
    fields:
      - label: Title
        name: title
        widget: string
      - label: Client
        name: client
        widget: string
      - label: Year
        name: year
        widget: string
      - label: Practice
        name: practice
        widget: select
        options:
          - Strategy
          - Transformation
          - Legal
          - Government
      - label: Description
        name: description
        widget: text
      - label: Body
        name: body
        widget: markdown

  - name: team
    label: Team
    folder: content/team
    create: true
    fields:
      - label: Name
        name: name
        widget: string
      - label: Role
        name: role
        widget: string
      - label: Level
        name: level
        widget: select
        options:
          - leadership
          - team
      - label: Order
        name: order
        widget: number
      - label: Photo
        name: photo
        widget: image
        required: false
      - label: Bio
        name: bio
        widget: text
      - label: LinkedIn
        name: linkedin
        widget: string
        required: false
      - label: Email
        name: email
        widget: string
        required: false